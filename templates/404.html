{% extends "base.html" %}
{% block content %}
<section style="padding:120px 0;text-align:center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 animated-fade">
                <div style="font-size:6rem;font-weight:800;color:var(--accent);line-height:1;margin-bottom:8px;letter-spacing:-4px;">404</div>
                <div style="width:40px;height:3px;background:var(--accent);border-radius:2px;margin:0 auto 24px;"></div>
                <h4 style="font-weight:700;margin-bottom:12px;">Page Not Found</h4>
                <p style="color:var(--text-muted);font-size:0.92rem;line-height:1.7;max-width:380px;margin:0 auto 36px;">The URL you requested does not exist or has been relocated. Check the address or navigate back.</p>
                <div class="d-flex justify-content-center gap-3 flex-wrap">
                    <a href="{{ url_for('home') }}" class="btn-accent"><i class="fas fa-house"></i> Return Home</a>
                    <a href="{{ url_for('predict') }}" class="btn-outline-sl"><i class="fas fa-bolt"></i> New Assessment</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
